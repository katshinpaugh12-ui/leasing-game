<!doctype html>

    <style>

  <body>
    <div id="app"></div>

    <script>
      const defaultPrizes = [
        "Free Lunch!!",
        "$15 Gift Card!!",
        "30 Min Extended Lunch!!",
        "Leave 1 Hour Early",
        "Starbucks Gift Card!!",
        "Target Gift Card!!",
        "Free Lunch!!",
        "$15 Gift Card!!",
        "30 Min Extended Lunch!!",
        "Leave 1 Hour Early!!",
        "Come In 1 Hour Late!!",
        "Come In 1 Hour Late!!",
        "Target Gift Card!!",
        "Free Lunch!!",
        "$15 Gift Card!!",
        "30 Min Extended Lunch!!",
        "Leave 1 Hour Early!!",
        "Starbucks Gift Card!!",
        "Starbucks Gift Card!!",
        "Target Gift Card!!",
        "Free Lunch!!",
        "$15 Gift Card!!",
        "30 Min Extended Lunch!!",
        "Come In 1 Hour Late!!",
      ];

      const storageKeys = {
        prizes: "sutton-place-deal-prizes",
        winners: "sutton-place-deal-winners",
      };

      function loadStoredJson(key, fallback) {
        try {
          const stored = window.localStorage?.getItem(key) || readCookie(key);
          return stored ? JSON.parse(stored) : fallback;
        } catch {
          return fallback;
        }
      }

      function saveStoredJson(key, value) {
        const serialized = JSON.stringify(value);

        try {
          window.localStorage?.setItem(key, serialized);
        } catch {
          // Cookie backup below still keeps the app usable when storage is blocked.
        }

        writeCookie(key, serialized);
        saveServerState();
      }

      async function saveServerState() {
        if (window.location.protocol === "file:") return;

        try {
          await fetch("/api/state", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ prizes, winners }),
          });
        } catch {
          // Browser storage and cookies are already updated as a fallback.
        }
      }

      async function loadServerState() {
        if (window.location.protocol === "file:") return;

        try {
          const response = await fetch("/api/state");
          const state = await response.json();
          let hasServerState = false;

          if (Array.isArray(state.prizes) && state.prizes.length > 0) {
            prizes = state.prizes;
            saveStoredJson(storageKeys.prizes, prizes);
            hasServerState = true;
          }

          if (Array.isArray(state.winners)) {
            winners = state.winners;
            saveStoredJson(storageKeys.winners, winners);
            hasServerState = true;
          }

          if (hasServerState) {
            caseContents = shufflePrizes(prizes);
            resetGame();
            render();
          }
        } catch {
          // Local browser backup is already loaded synchronously.
        }
      }

      function readCookie(key) {
        const cookie = document.cookie
          .split("; ")
          .find((item) => item.startsWith(`${encodeURIComponent(key)}=`));

        return cookie ? decodeURIComponent(cookie.split("=").slice(1).join("=")) : "";
      }

      function writeCookie(key, value) {
        document.cookie = `${encodeURIComponent(key)}=${encodeURIComponent(
          value
        )}; max-age=31536000; path=/; SameSite=Lax`;
      }

      let prizes = loadStoredJson(storageKeys.prizes, [...defaultPrizes]);
      let caseContents = shufflePrizes(prizes);
      let editingPrize = null;
      let tempValue = "";
      let openedCases = [];
      let selectedCase = null;
      let gameOver = false;
      let offer = null;
      let showAll = false;
      let winnerName = "";
      let winners = loadStoredJson(storageKeys.winners, []);

      function shufflePrizes(source) {
        const items = [...source];
        for (let i = items.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
        return items;
      }

      function resetGame() {
        openedCases = [];
        selectedCase = null;
        gameOver = false;
        offer = null;
        showAll = false;
        winnerName = "";
      }

      function startFreshShuffle() {
        caseContents = shufflePrizes(prizes);
        resetGame();
        render();
      }

      function revealAllPrizes() {
        selectedCase = null;
        openedCases = [];
        showAll = true;
        gameOver = true;
        winnerName = "";
        render();
      }

      function handleCaseClick(index) {
        if (gameOver || offer) return;

        selectedCase = index;
        openedCases = [index];
        gameOver = true;
        render();
        const input = document.querySelector("[data-winner-input]");
        if (input) input.focus();
      }

      function acceptDeal() {
        gameOver = true;
        showAll = true;
        render();
      }

      function declineDeal() {
        offer = null;
        render();
      }

      function editPrize(index) {
        editingPrize = index;
        tempValue = prizes[index];
        render();
        const input = document.querySelector(`[data-prize-input="${index}"]`);
        if (input) {
          input.focus();
          input.select();
        }
      }

      function savePrize(index) {
        const input = document.querySelector(`[data-prize-input="${index}"]`);
        const cleanValue = (input ? input.value : tempValue).trim();
        if (!cleanValue) return;

        prizes = prizes.map((prize, prizeIndex) =>
          prizeIndex === index ? cleanValue : prize
        );
        saveStoredJson(storageKeys.prizes, prizes);
        editingPrize = null;
        caseContents = shufflePrizes(prizes);
        resetGame();
        render();
      }

      function addPrize() {
        prizes = [...prizes, `New Incentive ${prizes.length + 1}`];
        saveStoredJson(storageKeys.prizes, prizes);
        caseContents = shufflePrizes(prizes);
        resetGame();
        render();
      }

      function removePrize(index) {
        if (prizes.length <= 3) return;

        prizes = prizes.filter((_, prizeIndex) => prizeIndex !== index);
        saveStoredJson(storageKeys.prizes, prizes);
        caseContents = shufflePrizes(prizes);
        resetGame();
        render();
      }

      function saveWinner() {
        const input = document.querySelector("[data-winner-input]");
        const cleanName = (input ? input.value : winnerName).trim();
        if (!cleanName || selectedCase === null) return;

        winners = [
          {
            name: cleanName,
            prize: caseContents[selectedCase],
            caseNumber: selectedCase + 1,
          },
          ...winners,
        ];
        saveStoredJson(storageKeys.winners, winners);
        startFreshShuffle();
      }

      function clearWinners() {
        winners = [];
        saveStoredJson(storageKeys.winners, winners);
        render();
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function prizeRow(prize, index) {
        if (editingPrize === index) {
          return `
            <div class="prize-row">
              <input
                data-prize-input="${index}"
                value="${escapeHtml(tempValue)}"
                class="prize-input"
                aria-label="Prize name"
              />
              <button class="button success icon-sized" data-action="save-prize" data-index="${index}">
                Save
              </button>
            </div>
          `;
        }

        return `
          <div class="prize-row">
            <span class="prize-name">${escapeHtml(prize)}</span>
            <div class="row-actions">
              <button class="button neutral icon-sized" data-action="edit-prize" data-index="${index}">
                Edit
              </button>
              <button
                class="button ghost icon-sized"
                data-action="remove-prize"
                data-index="${index}"
                ${prizes.length <= 3 ? "disabled" : ""}
              >
                Remove
              </button>
            </div>
          </div>
        `;
      }

      function caseButton(prize, index) {
        const isOpened = openedCases.includes(index);
        const isSelected = selectedCase === index;
        const isRevealed = isOpened || showAll;
        const classes = [
          "case-button",
          isSelected ? "selected" : "",
          isRevealed ? "revealed" : "",
        ]
          .filter(Boolean)
          .join(" ");

        return `
          <button
            class="${classes}"
            data-action="case-click"
            data-index="${index}"
            ${gameOver || offer || isOpened ? "disabled" : ""}
          >
            ${
              !isRevealed
                ? `
                  <span class="case-front">
                    <span class="case-icon" aria-hidden="true"></span>
                    <span class="case-number">${index + 1}</span>
                    ${isSelected ? '<span class="your-case">Your Case</span>' : ""}
                  </span>
                `
                : `<span class="case-prize">${escapeHtml(prize)}</span>`
            }
          </button>
        `;
      }

      function render() {
        document.getElementById("app").innerHTML = `
          <div class="app-shell">
            <main class="game-layout">
              <header class="page-header">
                <p class="eyebrow">Leasing Incentive Edition</p>
                <h1>Deal or No Deal</h1>
              </header>

              <section class="content-grid">
                <aside class="panel incentives-panel" aria-label="Editable incentives">
                  <div class="panel-header">
                    <div>
                      <p class="panel-kicker">Prize List</p>
                      <h2>Editable Incentives</h2>
                    </div>
                    <button class="button primary small" data-action="add-prize">Add</button>
                  </div>

                  <div class="prize-list">
                    ${prizes.map(prizeRow).join("")}
                  </div>
                </aside>

                <section class="panel board-panel" aria-label="Game board">
                  <h1 class="brand-title">Sutton Place Deal Or No Deal</h1>

                  <div class="board-topbar">
                    <div>
                      <p class="panel-kicker">Game Board</p>
                      <h2>Ready when you are</h2>
                    </div>

                    <div class="top-actions">
                      <button class="button accent" data-action="reveal-all">
                        Reveal All Prizes
                      </button>
                      <button class="button outline" data-action="shuffle">
                        Scramble
                      </button>
                    </div>
                  </div>

                  ${
                    selectedCase !== null
                      ? `
                        <div class="selected-banner">
                          Your selected case: <strong>#${selectedCase + 1}</strong>
                        </div>
                      `
                      : ""
                  }

                  ${
                    offer && !gameOver
                      ? `
                        <div class="offer-card" role="dialog" aria-live="polite">
                          <p>The Banker Offers</p>
                          <h3>${escapeHtml(offer)}</h3>
                          <div class="deal-actions">
                            <button class="button success large" data-action="deal">Deal</button>
                            <button class="button danger large" data-action="no-deal">No Deal</button>
                          </div>
                        </div>
                      `
                      : ""
                  }

                  <div class="case-grid">
                    ${caseContents.map(caseButton).join("")}
                  </div>

                  ${
                    gameOver && selectedCase !== null
                      ? `
                        <div class="finish-card">
                          <p>Game Finished</p>
                          <h3>Your Case Contains:</h3>
                          <strong>
                            ${
                              selectedCase !== null
                                ? escapeHtml(caseContents[selectedCase])
                                : "No case selected"
                            }
                          </strong>
                          ${
                            selectedCase !== null
                              ? `
                                <div class="winner-form">
                                  <input
                                    class="winner-input"
                                    data-winner-input
                                    value="${escapeHtml(winnerName)}"
                                    placeholder="Type winner name"
                                    aria-label="Winner name"
                                  />
                                  <button class="button success" data-action="save-winner">
                                    Save Winner
                                  </button>
                                </div>
                              `
                              : ""
                          }
                        </div>
                      `
                      : ""
                  }

                  ${
                    winners.length
                      ? `
                        <div class="winner-list" aria-label="Winner history">
                          <div class="winner-list-header">
                            <p class="panel-kicker">Saved Winners</p>
                            <button class="button outline" data-action="clear-winners">
                              Clear Winners
                            </button>
                          </div>
                          ${winners
                            .map(
                              (winner) => `
                                <div class="winner-row">
                                  <span>${escapeHtml(winner.name)}</span>
                                  <small>Case #${winner.caseNumber}: ${escapeHtml(winner.prize)}</small>
                                </div>
                              `
                            )
                            .join("")}
                        </div>
                      `
                      : ""
                  }
                </section>
              </section>

              <footer>Customize the incentives, click a case, then save the winner.</footer>
            </main>
          </div>
        `;
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;

        const action = target.dataset.action;
        const index = Number(target.dataset.index);

        if (action === "add-prize") addPrize();
        if (action === "edit-prize") editPrize(index);
        if (action === "save-prize") savePrize(index);
        if (action === "remove-prize") removePrize(index);
        if (action === "case-click") handleCaseClick(index);
        if (action === "shuffle") startFreshShuffle();
        if (action === "reveal-all") revealAllPrizes();
        if (action === "deal") acceptDeal();
        if (action === "no-deal") declineDeal();
        if (action === "save-winner") saveWinner();
        if (action === "clear-winners") clearWinners();
      });

      document.addEventListener("input", (event) => {
        if (event.target.matches("[data-prize-input]")) {
          tempValue = event.target.value;
        }

        if (event.target.matches("[data-winner-input]")) {
          winnerName = event.target.value;
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.target.matches("[data-winner-input]") && event.key === "Enter") {
          saveWinner();
          return;
        }

        if (!event.target.matches("[data-prize-input]")) return;

        const index = Number(event.target.dataset.prizeInput);
        if (event.key === "Enter") savePrize(index);
        if (event.key === "Escape") {
          editingPrize = null;
          render();
        }
      });

      render();
      loadServerState();
    </script>
  </body>
</html>
